schema: spec-driven-with-adr

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Язык: русский (ru-RU)
  Все артефакты должны быть написаны на русском языке.

  Описание проекта, существующие сервисы и порядок взаимодействия между ними,
  а также существующие архитектурные решения описаны в папке `openspec/context`.
  Перед созданием артефактов необходимо ознакомиться с этими файлами.

# Per-artifact rules
rules:
  proposal:
    - Используется только "бизнес"-описание, без технических деталей
  design:
    - Используется только "техническое" описание, без бизнес-описания
    - Обязательно проверь контекст проекта и соответствуюший кодовый граф <repo>/graph/<service-name>
