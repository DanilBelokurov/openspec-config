name: spec-driven-with-adr
version: 1
description: Default OpenSpec workflow - proposal → specs → design → adr → tasks (ADRs persist at <repo>/adr/)
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: >
      Create the proposal document that establishes WHY this change is needed.


      Sections:

      - **Why**: 1-2 sentences on the problem or opportunity. What problem does
      this solve? Why now?

      - **What Changes**: Bullet list of changes. Be specific about new
      capabilities, modifications, or removals. Mark breaking changes with
      **BREAKING**.

      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names (e.g., `user-auth`, `data-export`).
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Only include if spec-level behavior changes (not just implementation details). Each needs a delta spec file. Check `openspec/specs/` for existing spec names. Leave empty if no requirement changes.
      - **Impact**: Affected code, APIs, dependencies, or systems.


      IMPORTANT: The Capabilities section is critical. It creates the contract
      between

      proposal and specs phases. Research existing specs before filling this in.

      Each capability listed here will need a corresponding spec file.


      Keep it concise (1-2 pages). Focus on the "why" not the "how" -

      implementation details belong in design.md.


      Durable architectural decisions worth carrying across changes are
      distilled into ADR files at <repo>/adr/ by a later step (after design).


      This is the foundation - specs, design, adr, and tasks all build on this.
    requires: []
  - id: specs
    generates: specs/**/**/*.md
    description: Detailed specifications for the change
    template: spec.md
    instruction: >
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.

      - **New capabilities**: place the spec file at `specs/<domain>/<capability>/spec.md`,
        where `<domain>` is the functional domain of the capability (e.g., `metrics`, `auth`, `storage`).
        Determine the domain from the proposal context, the capability name (first kebab-case segment before the first hyphen), or use `core` if no clear domain exists.
        Example: for a capability named `cpu-usage-collector` that belongs to metrics, the path would be `specs/metrics/cpu-usage-collector/spec.md`.

      - **Modified capabilities**: use the existing spec folder path from `openspec/specs/` as the base.
        Create the delta spec at `specs/<relative-path>/spec.md`, where `<relative-path>` is the path relative to `openspec/specs/`.
        Example: if the existing spec is at `openspec/specs/metrics/cpu-usage/spec.md`, the delta spec must be placed at `specs/metrics/cpu-usage/spec.md`.
        If the existing spec does not follow a domain structure (e.g., `openspec/specs/export/spec.md`), keep the same relative path under `specs/` (i.e., `specs/export/spec.md`).

      Delta operations (use ## headers):

      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:

      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      MODIFIED requirements workflow:

      1. Locate the existing requirement in `openspec/specs/<relative-path>/spec.md` (using the same relative path determined for the delta).
      2. Copy the ENTIRE requirement block (from `### Requirement:` through all scenarios).
      3. Paste under `## MODIFIED Requirements` and edit to reflect new behavior.
      4. Ensure header text matches exactly (whitespace-insensitive).

      Common pitfall: Using MODIFIED with partial content loses detail at archive time.
      If adding new concerns without changing existing behavior, use ADDED instead.

      Example:

      ```

      ## ADDED Requirements


      ### Requirement: User can export data

      The system SHALL allow users to export their data in CSV format.


      #### Scenario: Successful export

      - **WHEN** user clicks "Export" button

      - **THEN** system downloads a CSV file with all user data


      ## REMOVED Requirements


      ### Requirement: Legacy export

      **Reason**: Replaced by new export system

      **Migration**: Use new export endpoint at /api/v2/export
      ```

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal
  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: >
      Create the design document that explains HOW to implement the change.

      Always include design.md (especially if any apply):

      - Cross-cutting change (multiple services/modules) or new architectural
      pattern

      - New external dependency or significant data model changes

      - Security, performance, or migration complexity

      - Ambiguity that benefits from technical decisions before coding

      Before writing double check project context from `openspec/context` folder.
      Every techincal decision must be coherent with the in-force set of ADRs and match the existing code patterns (see below).

      Project context (read existing context files first):

      Project context files are in <repo>/openspec/context/.
      They describe the current state of the system, including architecture, dependencies, and constraints.
      Read them before writing design.md to ensure your design is compatible with the existing system.
      With these files you can answer questions like:
      - Is this changes only for a single service or does it affect multiple services?
      - If there are multiple services, how do they named, communicate and what are the dependencies?
      - Are there existing patterns for this type of change?

      Prior decisions (read existing ADRs first):

      Before writing, list every file in <repo>/adr/. Build the supersession
      graph from each ADR's Supersedes field — an ADR is no longer in force if
      a later ADR's Supersedes points at it. Only the currently-in-force ADRs
      (accepted, not superseded) constrain this design — older superseded
      ADRs are historical context only and MUST NOT be treated as live
      commitments. New design choices MUST be coherent with the in-force set.
      If a current ADR needs to be revisited, do not propose modifying it;
      flag it under Open Questions and let the adr step record a new
      superseding ADR.

      Existing code patterns:
      
      Before writing code examples, check existing code patterns from code-graph.
      Graphs located in <repo>/graph/<service-name>.
      You can know service name by reading context files.
      If the change affects multiple services, check each service's graph.

      Sections:

      - **Context**: Background, current state, constraints, stakeholders

      - **Goals / Non-Goals**: What this design achieves and explicitly excludes

      - **Decisions**: Key technical choices with rationale (why X over Y?).
      Include alternatives considered for each decision.

      - **Risks / Trade-offs**: Known limitations, things that could go wrong.
      Format: [Risk] → Mitigation

      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)

      - **Open Questions**: Outstanding decisions or unknowns to resolve.
      Include any in-force ADRs that this design suggests revisiting — the
      adr step will record the supersession.

      If your decisions contain new cross-service integration.
      You must describe technical details (for example, API contract, data mode, message validation schema, kafka topic etc.)

      Focus on architecture and approach, not line-by-line implementation.

      Reference the proposal for motivation and specs for requirements.


      Good design docs explain the "why" behind technical decisions.
    requires:
      - proposal
  - id: adr
    generates: adr.md
    description: Change-local ADR review manifest with durable ADR references
    template: adr.md
    instruction: >
      Complete ADR review for this change by writing
      openspec/changes/<change>/adr.md. This change-local file is a concise
      review manifest and the OpenSpec completion marker for the adr artifact.
      Existing files under <repo>/adr/ are decision history and context; they
      do not complete ADR review for a new change.


      Durable Architecture Decision Records still live in <repo>/adr/ and
      persist across changes. The path <repo>/adr/ means the target
      repository's top-level adr/ folder beside openspec/, not any folder
      inside openspec/. If this change introduces a new durable architectural
      decision, create a repository-level ADR at
      <repo>/adr/NNNN-kebab-title.md and reference it from
      openspec/changes/<change>/adr.md. Do not duplicate the full ADR content
      in the manifest.


      IRON RULE — ADRs are immutable once accepted. You MUST NOT edit a prior
      ADR file under any circumstance (not its Status, not its body, not its
      date — nothing). To change a previously accepted decision, record a NEW
      ADR whose Status is "accepted, supersedes ADR-NNNN" and whose
      `Supersedes:` field names the prior one. Design consumers derive what is
      currently in force by walking Supersedes links across the folder — the
      prior ADR's contents stay frozen as a historical record.


      Process:


      1. Read every existing ADR in <repo>/adr/. Build the supersession graph
      from each ADR's Supersedes field. Note the highest sequence number in
      use. Record the currently in-force ADRs reviewed in the change-local
      adr.md manifest.


      2. Re-read design.md. Identify decisions that meet ALL of these:

      - Establish a long-term architectural commitment (pattern, technology,
      boundary, contract) — not a tactical implementation detail.

      - Will affect future changes beyond this one.

      - Either aren't already captured by a currently-in-force ADR, OR
      intentionally diverge from one (in which case the new ADR supersedes the
      prior).


      3. For each qualifying decision, create a NEW file at
      <repo>/adr/NNNN-kebab-title.md, where NNNN is a 4-digit sequence one
      greater than the highest existing. Use the repository's ADR format
      (MADR-short: title, status/date, context, decision, consequences). If
      this decision replaces a prior in-force ADR, set Status to
      "accepted, supersedes ADR-NNNN", populate the `Supersedes:` field, and
      explain in Context why the prior decision is being revisited. Do NOT
      touch the prior ADR's file — leave it exactly as it was. Reference every
      new repository-level ADR file from openspec/changes/<change>/adr.md.


      4. If nothing meets the bar, do not invent ADRs. The step still completes
      by writing openspec/changes/<change>/adr.md with:
      - ADR review completed for this change.
      - The in-force ADR context reviewed, or "none" if no existing ADRs exist.
      - A statement that no major durable architectural decisions were
      introduced.


      Filename convention: NNNN-kebab-title.md (e.g.,
      0042-use-postgres-for-catalog.md). Sequence is monotonic across the
      whole repo and never reused.
    requires:
      - design
  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: >
      Create the task list that breaks down the implementation work.


      **IMPORTANT: Follow the template below exactly.** The apply phase parses

      checkbox format to track progress. Tasks not using `- [ ]` won't be
      tracked.


      Guidelines:

      - Group related tasks under ## numbered headings

      - Each task MUST be a checkbox: `- [ ] X.Y Task description`

      - Tasks should be small enough to complete in one session

      - Order tasks by dependency (what must be done first?)


      Example:

      ```

      ## 1. Setup


      - [ ] 1.1 Create new module structure

      - [ ] 1.2 Add dependencies to package.json


      ## 2. Core Implementation


      - [ ] 2.1 Implement data export function

      - [ ] 2.2 Add CSV formatting utilities

      ```


      Reference specs for what to build, design for how to build it, and
      <repo>/adr/ for the durable architectural commitments to honor.

      Each task should be verifiable - you know when it's done.
    requires:
      - specs
      - adr
apply:
  requires:
    - tasks
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    Pause if you hit blockers or need clarification.
